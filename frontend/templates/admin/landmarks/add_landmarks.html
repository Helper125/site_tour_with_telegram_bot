<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Landmark</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', path='static/css/admin.css') }}"
    >
</head>
<body>

<div class="container">

    <div class="top-bar">

        <h1>📍 Add Landmark</h1>

        <a
            href="/LandmarksInLands/admin/landmarks"
            class="btn"
        >
            ← Back
        </a>

    </div>

    <div class="card">

        <form method="post" action="/LandmarksInLands/admin/add_landmarks">

            <div class="search-row" style="flex-direction:column; align-items:flex-start;">

                <label>Name</label>
                <input
                    type="text"
                    name="name"
                    placeholder="Enter landmark name"
                    required
                >

                <label>Address</label>
                <input
                    type="text"
                    name="address"
                    placeholder="Enter address"
                    required
                >

                <label>Description</label>
                <input
                    type="text"
                    name="description"
                    placeholder="Enter description"
                    required
                >

                <label>City</label>

                <select name="city_id" required>

                    {% for city in repo %}

                    <option value="{{ city.id }}">
                        {{ city.name }}
                    </option>

                    {% endfor %}

                </select>

                <button
                    type="submit"
                    class="btn"
                    style="margin-top:15px;"
                >
                    Create Landmark
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
