<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Landmark</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', path='static/css/admin.css') }}"
    >
</head>
<body>

<div class="container">

    <div class="top-bar">

        <h1>📍 Edit Landmark</h1>

        <a
            href="/LandmarksInLands/admin/landmarks"
            class="btn"
        >
            ← Back
        </a>

    </div>

    <div class="card">

        <form
            method="post"
            action="/LandmarksInLands/admin/landmark/update/{{ result.name }}"
        >

            <div class="search-row" style="flex-direction:column; align-items:flex-start;">

                <label>Name</label>
                <input
                    type="text"
                    name="new_name"
                    value="{{ result.name }}"
                    required
                >

                <label>Address</label>
                <input
                    type="text"
                    name="address"
                    value="{{ result.address }}"
                    required
                >

                <label>Description</label>
                <input
                    type="text"
                    name="description"
                    value="{{ result.description }}"
                    required
                >

                <label>City</label>

                <select name="city">

                    {% for all in cities %}

                    <option
                        value="{{ all.id }}"
                        {% if all.id == result.city.id %}selected{% endif %}>
                        {% if all.id == result.city.id %}select{% endif %}
                        {{ all.name }}
                    </option>

                    {% endfor %}

                </select>

                <button
                    type="submit"
                    class="btn"
                    style="margin-top:15px;"
                >
                    Save Changes
                </button>

            </div>

        </form>

    </div>

    <div class="card">

        <a
            href="/LandmarksInLands/admin/one_landmark/delete/{{ result.id }}"
            class="btn btn-danger"
        >
            Delete Landmark
        </a>

    </div>

</div>

</body>
</html>
