<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lands</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', path='static/css/admin.css') }}"
    >
</head>
<body>

<div class="container">

    <div class="top-bar">

        <h1>🌍 Lands</h1>

        <div>

            <a
                href="/LandmarksInLands/admin"
                class="btn"
            >
                ← Back
            </a>

            <a
                href="/LandmarksInLands/admin/add_land"
                class="btn"
            >
                + Add Land
            </a>

        </div>

    </div>

    <div class="card">

        <form
            method="get"
            action="/LandmarksInLands/admin/lands"
        >

            <div class="search-row">

                <input
                    type="search"
                    name="search_query"
                    placeholder="Search land..."
                >

                <label>
                    <input
                        type="radio"
                        name="sort_by"
                        value="id"
                        checked
                    >
                    ID
                </label>

                <label>
                    <input
                        type="radio"
                        name="sort_by"
                        value="name"
                    >
                    Name
                </label>

                <button
                    type="submit"
                    class="btn"
                >
                    Search
                </button>

            </div>

        </form>

    </div>

    {% if result %}

    <form
        method="post"
        action="/LandmarksInLands/admin/land/delete"
    >

        <div class="card">

            <div class="actions">

                <select name="action">

                    <option value="">
                        Choose action
                    </option>

                    <option value="delete_objects">
                        Delete selected
                    </option>

                </select>

                <button
                    type="submit"
                    class="btn btn-danger"
                >
                    Apply
                </button>

            </div>

            <table>

                <thead>

                    <tr>
                        <th>Select</th>
                        <th>ID</th>
                        <th>Name</th>
                    </tr>

                </thead>

                <tbody>

                    {% for all in result %}

                    <tr>

                        <td>
                            <input
                                type="checkbox"
                                name="land_id"
                                value="{{ all.id }}"
                            >
                        </td>

                        <td>
                            {{ all.id }}
                        </td>

                        <td>
                            <a href="/LandmarksInLands/admin/land_more/{{ all.name }}">
                                {{ all.name }}
                            </a>
                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </form>

    {% else %}

    <div class="card">

        <h3>
            No lands found.
        </h3>

    </div>

    {% endif %}

</div>

</body>
</html>
