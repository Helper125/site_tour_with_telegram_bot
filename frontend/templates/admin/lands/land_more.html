<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Land</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', path='static/css/admin.css') }}"
    >
</head>
<body>

<div class="container">

    <div class="top-bar">

        <h1>🌍 Edit Land</h1>

        <a
            href="/LandmarksInLands/admin/lands"
            class="btn"
        >
            ← Back
        </a>

    </div>

    <div class="card">

        <form
            method="post"
            action="/LandmarksInLands/admin/land/update/{{ result.name }}"
        >

            <div class="search-row" style="flex-direction:column; align-items:flex-start;">

                <label>Land name</label>

                <input
                    type="text"
                    name="new_name"
                    value="{{ result.name }}"
                    required
                >

                <button
                    type="submit"
                    class="btn"
                    style="margin-top:15px;"
                >
                    Save Changes
                </button>

            </div>

        </form>

    </div>

    <div class="card">

        <a
            href="/LandmarksInLands/admin/one_land/delete/{{ result.id }}"
            class="btn btn-danger"
        >
            Delete Land
        </a>

    </div>

</div>

</body>
</html>
