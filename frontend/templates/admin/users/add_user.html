<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', path='static/css/admin.css') }}"
    >
</head>
<body>

<div class="container">

    <div class="top-bar">

        <h1>👤 Add User</h1>

        <a
            href="/LandmarksInLands/admin/users"
            class="btn"
        >
            ← Back
        </a>

    </div>

    <div class="card">

        <form method="post" action="/LandmarksInLands/admin/add_user">

            <div class="search-row" style="flex-direction:column; align-items:flex-start;">

                <label>Username</label>
                <input
                    type="text"
                    name="username"
                    placeholder="Enter username"
                    required
                >

                <label>Email</label>
                <input
                    type="email"
                    name="email"
                    placeholder="example@gmail.com"
                    required
                >

                <label>Password</label>
                <input
                    type="password"
                    name="password"
                    placeholder="Enter password"
                    required
                >

                <label style="display:flex; align-items:center; gap:10px;">
                    <input type="checkbox" name="is_admin">
                    Is Admin
                </label>

                <button
                    type="submit"
                    class="btn"
                    style="margin-top:15px;"
                >
                    Create User
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
