<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" href="{{ url_for('static', path='static/css/login.css') }}">
</head>
<body>

<div class="login-container">

    <div class="navbar">
        Login
    </div>

    <form id="LoginForm">

        <label>Email address</label>
        <input type="email" id="email" required>

        <label>Password</label>
        <input type="password" id="password" required>

        <button type="submit">Login</button>

        <div class="auth-switch">
            <a class="auth-link" href="/LandmarksInLands/register">Register</a>
            <a class="auth-link" href="/LandmarksInLands/lands" style="background-color: rgb(22, 26, 91);">Back</a>
        </div>

        <div id="error"></div>

    </form>
</div>

<script>
document.getElementById('LoginForm').addEventListener("submit", async (e) => {
    e.preventDefault()

    const res = await fetch("/LandmarksInLands/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        })
    })

    if (res.ok) {
        window.location.href = "/LandmarksInLands/lands"
    } else {
        const err = await res.json()

        const box = document.getElementById("error")
        box.style.display = "block"
        box.textContent = err.detail
    }
})
</script>

</body>
</html>
