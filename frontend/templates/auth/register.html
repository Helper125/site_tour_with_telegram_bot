<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Register</title>
</head>
<body>
    <div>
        <nav class="navbar navbar-dark bg-dark md-4">
            <div class="container">
                <span class="navbar-brand">Register</span>
            </div>
        </nav>
    </div>
    <form id="RegisterForm">
        <div class="mb-3">
            <label for="exampleInputUsername1" class="from-label">Username</label>
            <input type="text" class="form-control", id="exampleInputUsername1" aria-describedby="usernameHelp">
        </div>
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Email address</label>
            <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
            <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
        </div>
        <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Password</label>
            <input type="password" class="form-control" id="exampleInputPassword1">
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>
    </form>

    <script>
        document.getElementById('RegisterForm').addEventListener("submit", async (e) => {
            e.preventDefault()

            const res = await fetch("/LandmarksInLands/register", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    username: document.getElementById("exampleInputUsername1").value,
                    email: document.getElementById("exampleInputEmail1").value,
                    password: document.getElementById("exampleInputPassword1").value
                })
            })

            if (res.ok) {
                window.location.href = "/LandmarksInLands/lands"
            }
            else {
                const err = await res.json()
                document.getElementById("error").classList.remove("d-none")
                document.getElementById("error").textContent = err.detail
            }
        })
    </script>
</body>
</html>
