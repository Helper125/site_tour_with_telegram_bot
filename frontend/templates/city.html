<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">🌍 Cities</span>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Cities in {{ alls.land }}</h2>
        <div id="city" class="row g-3"></div>
    </div>

    <div class="container">
        <div class="row g-3">
            {% for cities in alls.cities %}
            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">{{ cities.name }}</h5>
                        <h3>{{ cities.id }}</h3>
                        <a href="/LandmarksInLands/city/{{ cities.name }}" class="btn btn-outline-dark btn-sm">landmarks</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
