<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landmarks</title>

    <link rel="stylesheet" href="{{ url_for('static', path='static/css/lands.css') }}">
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div class="navbar-brand">🌍 Landmarks</div>

    <div>
        <a href="/LandmarksInLands/land/{{ land }}">← Back</a>
    </div>
</nav>

<!-- MAIN -->
<div class="container">

    <h2>Landmarks in {{ alls.city }}</h2>

    <!-- SEARCH -->
    <form class="search-form"
          method="get"
          action="/LandmarksInLands/city/{{ alls.city }}">

        <input type="search" name="search_query" placeholder="Search landmark...">
        <button type="submit">Search</button>

    </form>

    <!-- GRID -->
    <div class="row">

        {% for landmarks in alls.landmarks %}

        <div class="card">

            <div class="card-title">
                {{ landmarks.name }}
            </div>

            <a class="btn btn-cities"
               href="/LandmarksInLands/landmark/{{ landmarks.name }}">
                More
            </a>

            {% if user %}
            <form action="/LandmarksInLands/add-landmark-save" method="post">

                <input type="hidden" name="landmark_id" value="{{ landmarks.id }}">
                <input type="hidden" name="urls" value="{{ request.url }}">

                <button type="submit"
                        class="btn {% if landmarks.id in saved_ids %}btn-saved{% else %}btn-save{% endif %}">
                    {% if landmarks.id in saved_ids %}
                        💚 saved
                    {% else %}
                        🤍 save
                    {% endif %}
                </button>

            </form>
            {% endif %}

        </div>

        {% endfor %}

    </div>

    <!-- PAGINATION -->
    <div class="pagination">

        {% if page > 1 %}
            <a href="?page={{ page - 1 }}">← Previous</a>
        {% endif %}

        <span>Page {{ page }} of {{ pages }}</span>

        {% if page < pages %}
            <a href="?page={{ page + 1 }}">Next →</a>
        {% endif %}

    </div>

</div>

</body>
</html>
