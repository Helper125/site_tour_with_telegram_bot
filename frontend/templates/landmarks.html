<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>landmarks</title>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">🌍 landmarks</span>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">landmarkds in {{ alls.city }}</h2>
        <div id="city" class="row g-3"></div>
    </div>

    <div class="container">
        <div class="row g-3">
            {% for landmarks in alls.landmarks %}
            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">{{ landmarks.name }}</h5>
                        <a href="/LandmarksInLands/landmarks/{{ landmarks.name }}" class="btn btn-outline-dark btn-sm">more</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
